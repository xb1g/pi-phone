<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#0b0f14" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="Mobile-first remote UI for Pi coding assistant" />
    <title>Pi Phone</title>
    <link rel="manifest" href="/manifest.webmanifest?v=20260320-3" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css?v=20260320-3" />
  </head>
  <body>
    <!-- Theme Toggle -->
    <button id="theme-toggle-button" class="theme-toggle-button" aria-label="Toggle theme" title="Toggle dark/light theme">
      <span class="theme-icon-light">☀️</span>
      <span class="theme-icon-dark">🌙</span>
    </button>

    <!-- Session Sidebar Toggle -->
    <button id="session-sidebar-button" class="sidebar-toggle-button" aria-label="Open session browser" title="Sessions">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2" />
        <line x1="9" y1="3" x2="9" y2="21" />
      </svg>
    </button>

    <div class="app-shell">
      <!-- Minimal Topbar -->
      <header class="topbar">
        <div class="brand">
          <div class="eyebrow">Pi Phone</div>
          <h1>Your Pi, anywhere</h1>
        </div>
        <div class="status-indicators">
          <div class="connection-dot" id="connection-dot" title="Connection status"></div>
        </div>
      </header>

      <!-- Status Module - Clean, Essential Info -->
      <section class="status-module">
        <div class="status-module-grid">
          <div class="status-module-item">
            <div class="status-module-icon">📁</div>
            <div class="status-module-content">
              <div class="status-module-label">Directory</div>
              <div class="status-module-value mono" id="cwd-value">—</div>
            </div>
          </div>
          <div class="status-module-item">
            <div class="status-module-icon">💬</div>
            <div class="status-module-content">
              <div class="status-module-label">Session</div>
              <div class="status-module-value" id="session-value">—</div>
            </div>
          </div>
          <div class="status-module-item">
            <div class="status-module-icon">🤖</div>
            <div class="status-module-content">
              <div class="status-module-label">Model</div>
              <div class="status-module-value" id="model-value">—</div>
            </div>
          </div>
          <div class="status-module-item">
            <div class="status-module-icon">🧠</div>
            <div class="status-module-content">
              <div class="status-module-label">Thinking</div>
              <div class="status-module-value" id="thinking-value">—</div>
            </div>
          </div>
        </div>
      </section>

      <!-- Banner for notifications -->
      <section id="banner" class="banner hidden" role="alert"></section>
      
      <!-- Widget Stack for additional info -->
      <section id="widget-stack" class="widget-stack hidden"></section>

      <!-- Messages Container -->
      <main id="messages" class="messages" aria-live="polite" aria-label="Chat messages"></main>

      <!-- Sessions View Panel -->
      <div id="sessions-view" class="tab-panel" hidden>
        <div id="sessions-list" class="sessions-list">
          <!-- Rendered by sessions-view.js -->
        </div>
      </div>

      <!-- Enhanced Composer -->
      <section class="composer-wrap">
        <div class="composer">
          <input id="image-input" type="file" accept="image/*" multiple class="hidden" capture="environment" />
          
          <!-- Attachment Strip -->
          <div id="attachment-strip" class="attachment-strip hidden" aria-label="Attached files"></div>
          
          <!-- Quick Commands (static chips) -->
          <div id="quick-commands" class="quick-commands">
            <button class="command-chip" data-command="/cd ">📁 /cd</button>
            <button class="command-chip" data-command="/phone-stop">⏹ /phone-stop</button>
            <button class="command-chip" data-command="/clear">🗑 /clear</button>
            <button class="command-chip" data-command="/model ">🤖 /model</button>
          </div>
          
          <!-- Command Strip (autocomplete) -->
          <section id="command-strip" class="command-strip hidden" aria-label="Quick commands"></section>
          
          <!-- Input Row -->
          <div class="composer-input-row">
            <button id="attach-image-button" class="composer-attach-button" aria-label="Attach image" title="Attach image">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <polyline points="21 15 16 10 5 21" />
              </svg>
            </button>
            <textarea
              id="prompt-input"
              rows="1"
              maxlength="20000"
              placeholder="Message Pi…"
              autocomplete="off"
              autocapitalize="sentences"
              spellcheck="true"
              aria-label="Message input"
            ></textarea>
            <button id="stop-button" class="composer-inline-button stop-button danger hidden" aria-label="Stop response" title="Stop response">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" />
              </svg>
            </button>
            <button id="send-button" class="composer-inline-button send-button" aria-label="Send message" title="Send message">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13" />
                <polygon points="22 2 15 22 11 13 2 9 22 2" />
              </svg>
            </button>
          </div>
          
          <!-- Composer Actions -->
          <div class="composer-actions">
            <button id="insert-command-button" class="action-chip">
              <svg class="icon-tiny" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="4 7 4 4 20 4 20 7" />
                <line x1="9" y1="20" x2="15" y2="20" />
                <line x1="12" y1="4" x2="12" y2="20" />
              </svg>
              Commands
            </button>
            <button id="cd-command-button" class="action-chip">/cd</button>
            <button id="control-center-button" class="action-chip primary-chip">
              <svg class="icon-tiny" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3" />
                <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" />
              </svg>
              Control
            </button>
            <button id="steer-button" class="action-chip hidden">
              <svg class="icon-tiny" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3" />
                <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" />
              </svg>
              Steer
            </button>
          </div>
          
          <!-- Quota Display -->
          <div id="quota-row" class="quota-row hidden" aria-live="polite" aria-label="Token quota">
            <div id="quota-meta-row" class="quota-meta-row hidden">
              <span id="quota-cwd" class="quota-pill cwd-pill mono"></span>
            </div>
            <div id="quota-pills-row" class="quota-pills-row hidden">
              <span id="quota-context" class="quota-pill quota-context-pill mono hidden"></span>
              <span id="quota-primary" class="quota-pill"></span>
              <span id="quota-secondary" class="quota-pill"></span>
            </div>
          </div>
        </div>
      </section>

      <!-- Bottom Tab Bar -->
      <nav class="bottom-tab-bar" aria-label="Main navigation">
        <button class="tab-btn tab-btn--active" data-tab="chat" aria-label="Chat" aria-current="page">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span>Chat</span>
        </button>
        <button class="tab-btn" data-tab="sessions" aria-label="Sessions" aria-current="false">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
          <span>Sessions</span>
        </button>
        <button class="tab-btn" data-tab="menu" aria-label="Menu" aria-current="false">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
          <span>Menu</span>
        </button>
      </nav>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="login-modal-title">
      <div class="modal-card narrow">
        <div class="modal-header">
          <div class="modal-icon">🔐</div>
          <h2 id="login-modal-title">Access token required</h2>
        </div>
        <p class="modal-copy">Enter the app token configured in <code>/phone-start</code>.</p>
        <div class="input-group">
          <input id="token-input" type="password" placeholder="App token" autocomplete="new-password" autocapitalize="none" autocorrect="off" spellcheck="false" aria-label="App token" />
        </div>
        <div class="button-row">
          <button id="token-save-button" class="primary full-width">
            <svg class="icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 11.08V12a10 10 0 11-5.93-9.14" />
              <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
            Connect
          </button>
        </div>
      </div>
    </div>

    <!-- UI Modal for prompts -->
    <div id="ui-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="ui-modal-title">
      <div class="modal-card">
        <h2 id="ui-modal-title">Action required</h2>
        <p id="ui-modal-message" class="modal-copy"></p>
        <div id="ui-modal-options" class="option-list"></div>
        <textarea id="ui-modal-input" class="hidden" rows="8"></textarea>
        <div class="button-row" id="ui-modal-buttons"></div>
      </div>
    </div>

    <!-- Control Center (Redesigned) -->
    <div id="control-center" class="control-center hidden" role="dialog" aria-modal="true" aria-labelledby="control-center-title">
      <div class="control-center-backdrop" id="control-center-backdrop"></div>
      <div class="control-center-sheet">
        <div class="sheet-handle"></div>
        <div class="control-center-header">
          <div>
            <div class="eyebrow">Control Center</div>
            <h2 id="control-center-title">Session Controls</h2>
          </div>
          <button id="control-center-close-button" class="icon-button" aria-label="Close">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>

        <div class="cc-scroll">
          <!-- Session info -->
          <section class="cc-section cc-section--info" id="cc-session-info">
            <div class="cc-session-goal" id="cc-goal"></div>
            <div class="cc-session-meta">
              <span id="cc-project"></span>
              <span id="cc-status-badge" class="session-badge badge--idle">idle</span>
            </div>
          </section>

          <!-- Session actions -->
          <section class="cc-section">
            <h3 class="cc-section-title">Session</h3>
            <div class="cc-card-list">
              <button class="cc-card" id="cc-new-session">
                <span class="cc-card__icon" aria-hidden="true">＋</span>
                <span class="cc-card__label">New session</span>
              </button>
              <button class="cc-card" id="cc-switch-session">
                <span class="cc-card__icon" aria-hidden="true">⇄</span>
                <span class="cc-card__label">Switch session</span>
              </button>
              <button class="cc-card" id="cc-stop-session">
                <span class="cc-card__icon" aria-hidden="true">◼</span>
                <span class="cc-card__label">Stop session</span>
              </button>
            </div>
          </section>

          <!-- Model -->
          <section class="cc-section">
            <h3 class="cc-section-title">Model</h3>
            <button class="cc-model-chip" id="cc-model-chip">
              <span id="cc-model-name">—</span>
              <span class="cc-model-chevron" aria-hidden="true">›</span>
            </button>
          </section>

          <!-- Danger zone -->
          <section class="cc-section cc-section--danger">
            <h3 class="cc-section-title cc-section-title--danger">Danger</h3>
            <div class="cc-card-list">
              <button class="cc-card cc-card--danger" id="cc-kill-server">
                <span class="cc-card__icon" aria-hidden="true">✕</span>
                <span class="cc-card__label">Kill server</span>
              </button>
            </div>
          </section>
        </div>
      </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-host" class="toast-host" aria-live="polite" aria-atomic="true"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay hidden" aria-hidden="true">
      <div class="loading-spinner"></div>
      <p class="loading-text">Loading…</p>
    </div>

    <script type="module" src="/app.js?v=20260320-3"></script>
  </body>
</html>
